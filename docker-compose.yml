services:
  db:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: commissions
      POSTGRES_PASSWORD: commissions
      POSTGRES_DB: commissions
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U commissions"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      DATABASE_URL: postgresql://commissions:commissions@db:5432/commissions
      PORT: 3001
      NODE_ENV: development
      JWT_SECRET: dev-secret-change-in-prod
      CORS_ORIGIN: http://localhost:5173
    depends_on:
      db:
        condition: service_healthy
    develop:
      watch:
        - action: sync
          path: ./apps/api/src
          target: /app/apps/api/src
        - action: sync
          path: ./packages
          target: /app/packages

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    restart: unless-stopped
    ports:
      - "5173:80"
    environment:
      VITE_API_BASE_URL: http://localhost:3001
    depends_on:
      - api

volumes:
  postgres_data:
